name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run format-and-lint

      - name: Typecheck
        run: bun run typecheck

      - name: Check browser packages
        run: bun run check:browser

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check release artifacts
        run: bun run check:release

      - name: Audit dependencies
        run: bun audit

  cli-runtime:
    name: CLI runtime (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI dependencies
        run: bun run turbo run build --filter=openai-oauth

      - name: Test CLI runtime
        run: bun run --cwd packages/openai-oauth test
